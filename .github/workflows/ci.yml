name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed packages
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      bnm: ${{ steps.filter.outputs.bnm }}
      cbcd: ${{ steps.filter.outputs.cbcd }}
      citk: ${{ steps.filter.outputs.citk }}
      dagsampler: ${{ steps.filter.outputs.dagsampler }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            bnm:
              - 'bnm/**'
              - '.github/workflows/ci.yml'
            cbcd:
              - 'cbcd/**'
              - '.github/workflows/ci.yml'
            citk:
              - 'citk/**'
              - '.github/workflows/ci.yml'
            dagsampler:
              - 'dagsampler/**'
              - '.github/workflows/ci.yml'

  bnm:
    name: bnm tests
    needs: changes
    if: needs.changes.outputs.bnm == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: bnm
    steps:
      - uses: actions/checkout@v4

      - name: Install graphviz binary
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "bnm/uv.lock"

      - name: Sync deps
        run: uv sync --all-extras

      - name: pytest
        run: uv run pytest -q

  cbcd:
    name: cbcd tests
    needs: changes
    if: needs.changes.outputs.cbcd == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: cbcd
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "cbcd/uv.lock"

      - name: Sync deps
        run: uv sync --all-extras

      - name: pytest
        run: uv run pytest -q

  citk:
    name: citk tests
    needs: changes
    if: needs.changes.outputs.citk == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: citk
    steps:
      - uses: actions/checkout@v4

      - name: Install system build deps
        # libtirpc-dev is required to link rpy2-rinterface's C extension;
        # the libcurl/libssl/libxml2 dev packages cover R-package
        # compilation (e.g. remotes, bnlearn dependencies). libgsl-dev
        # ships libgsl.so, which the R `gsl` package (an MXM dep) loads
        # at runtime.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev libssl-dev libxml2-dev libtirpc-dev libgsl-dev

      - name: Install R
        # rpy2 3.6.x requires R 4.5+ (uses the R_getVar symbol). The
        # apt r-base on Ubuntu noble is 4.3.3 and lacks that symbol;
        # setup-r installs the current R release and wires up
        # user-writable libraries + Posit Public Package Manager so
        # install.packages pulls binary builds.
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Install R packages
        # citk[r] tests exercise RCIT (GitHub), MXM (CRAN-archived;
        # remotes::install_version falls back to the CRAN archive
        # automatically when the package isn't on the live repo),
        # and bnlearn (CRAN). GITHUB_PAT lifts the unauthenticated
        # GitHub API rate limit that remotes::install_github
        # otherwise hits.
        env:
          GITHUB_PAT: ${{ github.token }}
        run: |
          R -e "install.packages(c('remotes', 'bnlearn'))"
          R -e "tryCatch(remotes::install_version('MXM'), error = function(e) message('MXM unavailable: ', e\$message))"
          R -e "remotes::install_github('ericstrobl/RCIT')"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "citk/uv.lock"

      - name: Sync deps
        run: uv sync --all-extras

      - name: pytest
        run: uv run pytest -q

  dagsampler:
    name: dagsampler tests
    needs: changes
    if: needs.changes.outputs.dagsampler == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: dagsampler
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "dagsampler/uv.lock"

      - name: Sync deps
        run: uv sync --all-extras

      - name: pytest
        run: uv run pytest -q
