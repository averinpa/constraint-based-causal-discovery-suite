name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed packages
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      bnm: ${{ steps.filter.outputs.bnm }}
      cbcd: ${{ steps.filter.outputs.cbcd }}
      citk: ${{ steps.filter.outputs.citk }}
      dagsampler: ${{ steps.filter.outputs.dagsampler }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            bnm:
              - 'bnm/**'
              - '.github/workflows/ci.yml'
            cbcd:
              - 'cbcd/**'
              - '.github/workflows/ci.yml'
            citk:
              - 'citk/**'
              - '.github/workflows/ci.yml'
            dagsampler:
              - 'dagsampler/**'
              - '.github/workflows/ci.yml'

  bnm:
    name: bnm tests
    needs: changes
    if: needs.changes.outputs.bnm == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: bnm
    steps:
      - uses: actions/checkout@v4

      - name: Install graphviz binary
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "bnm/uv.lock"

      - name: Sync deps
        run: uv sync --all-extras

      - name: pytest
        run: uv run pytest -q

  cbcd:
    name: cbcd tests
    needs: changes
    if: needs.changes.outputs.cbcd == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: cbcd
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "cbcd/uv.lock"

      - name: Sync deps
        run: uv sync --all-extras

      - name: pytest
        run: uv run pytest -q

  citk:
    name: citk tests
    needs: changes
    if: needs.changes.outputs.citk == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: citk
    steps:
      - uses: actions/checkout@v4

      - name: Install R + system build deps
        # citk[r] tests load R packages (RCIT, MXM, bnlearn) at runtime
        # via rpy2. Without R installed, rpy2 imports fail with
        # `r_home is None`. r-base-dev + libcurl/libssl/libxml2 cover
        # compilation of the R packages installed below.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            r-base r-base-dev \
            libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        # Posit Public Package Manager serves binary packages for Ubuntu,
        # avoiding source compilation for bnlearn and friends. R is run
        # under sudo so install.packages() can write to the site library
        # at /usr/local/lib/R/site-library (world-readable thereafter).
        run: |
          R_REPO="https://packagemanager.posit.co/cran/__linux__/$(. /etc/os-release && echo $VERSION_CODENAME)/latest"
          sudo R -e "install.packages(c('remotes', 'bnlearn'), repos='$R_REPO')"
          sudo R -e "tryCatch(install.packages('MXM', repos='$R_REPO'), error = function(e) message('MXM not available: ', e\$message))"
          sudo R -e "remotes::install_github('ericstrobl/RCIT')"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "citk/uv.lock"

      - name: Sync deps
        run: uv sync --all-extras

      - name: pytest
        run: uv run pytest -q

  dagsampler:
    name: dagsampler tests
    needs: changes
    if: needs.changes.outputs.dagsampler == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: dagsampler
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "dagsampler/uv.lock"

      - name: Sync deps
        run: uv sync --all-extras

      - name: pytest
        run: uv run pytest -q
