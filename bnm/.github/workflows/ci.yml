name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Run weekly to catch dependency-version drift even when nothing's
  # changed in this repo.
  schedule:
    - cron: "0 7 * * 1"

# Cancel an in-progress run when a new commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff + mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync deps
        run: uv sync --all-extras

      - name: ruff check
        run: uv run ruff check bnm tests scripts

      - name: ruff format --check
        run: uv run ruff format --check bnm tests scripts

      - name: mypy
        run: uv run mypy bnm

  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install graphviz binary
        # graphviz Python wrapper renders SVGs by piping to the `dot`
        # binary; the apt package provides it.
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}

      - name: Sync deps
        run: uv sync --all-extras

      - name: pytest with coverage
        run: |
          uv run pytest \
            --cov=bnm \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=90 \
            -q

      - name: Upload coverage XML
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  parity:
    name: cross-version notebook parity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync deps
        run: uv sync --all-extras

      - name: Cross-version parity check
        # Verifies v0.2 reproduces 0.1.x's GitHub-committed numerical
        # outputs on the same fixtures. See the script docstring.
        run: uv run python scripts/notebook_parity_check.py
